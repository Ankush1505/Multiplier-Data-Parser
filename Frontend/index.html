<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-gray-50 text-gray-800 font-sans p-8">
    <div class="max-w-7xl mx-auto">
      <header class="mb-10 flex items-center justify-between border-b pb-4">
        <div>
          <h1 class="text-3xl font-bold text-gray-900">Analytics Dashboard</h1>
          <p class="text-gray-500 mt-1">Real-time Business Metrics</p>
        </div>
        <div
          class="bg-green-100 text-green-800 px-3 py-1 rounded text-sm font-medium"
        >
          API Connected
        </div>
      </header>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
          <h2 class="text-lg font-semibold mb-4 text-gray-700">
            Monthly Revenue Trend
          </h2>
          <canvas id="revenueChart"></canvas>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
          <h2 class="text-lg font-semibold mb-4 text-gray-700">
            Revenue by Category
          </h2>
          <canvas id="categoryChart"></canvas>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
